# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Enable weekly updates for GitHub Actions (main)
  - package-ecosystem: "github-actions"
    directory: "/" # Dependabot knows to look in .github/workflows for GitHub Actions
    schedule:
      interval: "weekly"
    target-branch: "main"
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "devops-infra/action-pull-request"
        update-types:
          - "version-update:semver-patch"
    labels:
      - "dependencies"
      - "github_actions"
      - "Changelog Skip"
      - "0 Diff"

  # Enable weekly updates for GitHub Actions (main)
  - package-ecosystem: "github-actions"
    directory: "/" # Dependabot knows to look in .github/workflows for GitHub Actions
    schedule:
      interval: "weekly"
    target-branch: "develop"
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "devops-infra/action-pull-request"
        update-types:
          - "version-update:semver-patch"
    labels:
      - "dependencies"
      - "github_actions"
      - "Changelog Skip"
      - "0 Diff"

  # Enable daily updates for Docker (main)
  - package-ecosystem: "docker"
    directory: "/.docker" # Location of Dockerfile
    schedule:
      interval: "daily"
    target-branch: "main"
    labels:
      - "dependencies"
      - "Changelog Skip"
      - "0 Diff"

  # Enable daily updates for Docker (develop)
  - package-ecosystem: "docker"
    directory: "/.docker" # Location of Dockerfile
    schedule:
      interval: "daily"
    target-branch: "develop"
    labels:
      - "dependencies"
      - "Changelog Skip"
      - "0 Diff"
