# Example ProfileReporter configuration file
# This file demonstrates how to configure the columns displayed in profiling reports

columns:
  # Name column - shows the timer/profiler names with indentation
  - type: name
    width: 20

  # Number of cycles - how many times each timer was called
  - type: num_cycles
    name: "# cycles"
    format: "(i8.0)"
    width: 8

  # Separator between sections
  - type: separator
    char: "|"

  # Multi-column grouping for Inclusive metrics
  - type: multi
    name: "Inclusive"
    separator: "="
    columns:
      - type: inclusive
        name: "time"
        format: "(f10.6)"
        width: 10
        separator: "-"
      - type: percentage_inclusive
        name: "%"
        format: "(f6.2)"
        width: 6
        separator: "-"

  # Separator
  - type: separator
    char: "|"

  # Multi-column grouping for Exclusive metrics
  - type: multi
    name: "Exclusive"
    separator: "="
    columns:
      - type: exclusive
        name: "time"
        format: "(f10.6)"
        width: 10
        separator: "-"
      - type: percentage_exclusive
        name: "%"
        format: "(f6.2)"
        width: 6
        separator: "-"

