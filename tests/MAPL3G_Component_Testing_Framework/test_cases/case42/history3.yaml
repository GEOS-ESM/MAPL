geoms:
  geom1: &geom1
    class: latlon
    im_world: 20
    jm_world: 15
    pole: PC
    dateline: DC

active_collections:
  - monthly_full
  - djf_full

time_specs:
  monthly_output: &monthly_output
    frequency: P1M
    mode: average
    ref_datetime: "YYYY-MM-01T00:00:00"
  djf_output: &djf_output
    frequency: P3M
    mode: average
    ref_datetime: "YYYY-12-01T00:00:00"

collections:
  monthly_full:
    template: "%c_%y4%m2%d2_%h2%n2.nc4"
    #geom: *geom1
    time_spec: *monthly_output
    var_list:
      monthly_avg: {source: E_1}
  djf_full:
    template: "%c_%y4%m2%d2_%h2%n2.nc4"
    #geom: *geom1
    time_spec: *djf_output
    var_list:
      djf_avg: {source: E_1}
