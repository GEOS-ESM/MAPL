# ---------------------------------------------------------------------------
# Fortran-only constants (intentionally NOT in Python)
# ---------------------------------------------------------------------------
fortran_only:
  # Fortran kind/precision selectors — meaningless in Python
  - name: MAPL_R8
    reason: Fortran kind selector
  - name: MAPL_R4
    reason: Fortran kind selector
  - name: MAPL_RN
    reason: Fortran kind selector
  - name: MAPL_I8
    reason: Fortran kind selector
  - name: MAPL_I4
    reason: Fortran kind selector
  - name: MAPL_IN
    reason: Fortran kind selector

  # Typed undefined sentinels — Python exposes only MAPL_UNDEF
  - name: MAPL_UNDEFINED_REAL32
    reason: Typed Fortran sentinel; Python uses MAPL_UNDEF
  - name: MAPL_UNDEFINED_REAL64
    reason: Typed Fortran sentinel; Python uses MAPL_UNDEF
  - name: MAPL_UNDEFINED_REAL
    reason: Typed Fortran sentinel; Python uses MAPL_UNDEF
  - name: MAPL_UNDEFINED_INTEGER
    reason: Typed Fortran sentinel; no Python equivalent needed
  - name: MAPL_UNDEFINED_CHAR
    reason: Typed Fortran sentinel; no Python equivalent needed

  # Fortran GridComp infrastructure internals
  - name: MAPL_DESTINATIONMASK
    reason: Internal Fortran GridComp string; not used in Python

  # REAL64 variants — Python uses the single-precision alias or derives the value
  - name: MAPL_PI_R8
    reason: REAL64 variant; Python has MAPL_PI (REAL32 alias)
  - name: MAPL_DEGREES_TO_RADIANS_R8
    reason: REAL64 variant; Python has MAPL_DEGREES_TO_RADIANS
  - name: MAPL_ROTATION_RATE_R8
    reason: REAL64 variant of rotation rate
  - name: MAPL_OMEGA_R8
    reason: REAL64 variant; Python derives MAPL_OMEGA from MAPL_PI and MAPL_SECONDS_PER_SIDEREAL_DAY

  # New canonical names — Python exposes these only via deprecated aliases (backward compat)
  - name: MAPL_STEFAN_BOLTZMANN
    reason: Canonical name; Python exposes deprecated alias MAPL_STFBOL
  - name: MAPL_AVOGADRO
    reason: Canonical name; Python exposes deprecated alias MAPL_AVOGAD
  - name: MAPL_UNIVERSAL_GAS_CONSTANT
    reason: Canonical name; Python exposes deprecated alias MAPL_RUNIV
  - name: MAPL_MEAN_DRY_SURFACE_PRESSURE
    reason: Canonical name; Python exposes deprecated alias MAPL_PSDRY
  - name: MAPL_GRAVITY
    reason: Canonical name; Python exposes deprecated alias MAPL_GRAV
  - name: MAPL_ROTATION_RATE
    reason: Canonical name; Python derives MAPL_OMEGA
  - name: MAPL_ECCENTRICITY
    reason: Canonical name; Python exposes MAPL_EARTH_ECCENTRICITY
  - name: MAPL_SEMIMAJOR_AXIS
    reason: Canonical name; Python exposes MAPL_EARTH_SEMIMAJOR_AXIS
  - name: MAPL_SEMIMINOR_AXIS
    reason: Canonical name; no Python equivalent (not commonly needed)
  - name: MAPL_GEO_ORBIT_RADIUS
    reason: Canonical name; no Python equivalent
  - name: MAPL_KM_PER_DEGREE
    reason: Canonical name; Python exposes MAPL_KM_PER_DEG
  - name: MAPL_DEGREE_PER_KM
    reason: Canonical name; Python exposes MAPL_DEG_PER_KM
  - name: MAPL_MOLECULAR_WEIGHT_DRY_AIR
    reason: Canonical name; Python exposes deprecated alias MAPL_AIRMW
  - name: MAPL_MOLECULAR_WEIGHT_WATER
    reason: Canonical name; Python exposes deprecated alias MAPL_H2OMW
  - name: MAPL_MOLECULAR_WEIGHT_OZONE
    reason: Canonical name; Python exposes deprecated alias MAPL_O3MW
  - name: MAPL_GAS_CONSTANT_DRY_AIR
    reason: Canonical name; Python exposes deprecated alias MAPL_RDRY
  - name: MAPL_GAS_CONSTANT_WATER_VAPOR
    reason: Canonical name; Python exposes deprecated alias MAPL_RVAP
  - name: MAPL_SPECIFIC_HEAT_DRY_AIR_CONST_PRESSURE
    reason: Canonical name; Python exposes deprecated alias MAPL_CPDRY
  - name: MAPL_SPECIFIC_HEAT_DRY_AIR_CONST_VOLUME
    reason: Canonical name; Python exposes deprecated alias MAPL_CVDRY
  - name: MAPL_SPECIFIC_HEAT_WATER_VAPOR_CONST_PRESSURE
    reason: Canonical name; Python exposes deprecated alias MAPL_CPVAP
  - name: MAPL_SPECIFIC_HEAT_WATER_VAPOR_CONST_VOLUME
    reason: Canonical name; Python exposes deprecated alias MAPL_CVVAP
  - name: MAPL_ADIABATIC_INDEX
    reason: Canonical name; Python exposes deprecated alias MAPL_GAMMAD
  - name: MAPL_MOLECULAR_WEIGHT_RATIO
    reason: Canonical name; Python exposes deprecated alias MAPL_EPSILON
  - name: MAPL_CP_VAPOR_OVER_DRY_AIR
    reason: Canonical name; Python exposes deprecated alias MAPL_DELTAP
  - name: MAPL_CV_VAPOR_OVER_DRY_AIR
    reason: Canonical name; Python exposes deprecated alias MAPL_DELTAV
  - name: MAPL_LATENT_HEAT_VAPORIZATION
    reason: Canonical name; Python exposes deprecated alias MAPL_ALHL
  - name: MAPL_LATENT_HEAT_FUSION
    reason: Canonical name; Python exposes deprecated alias MAPL_ALHF
  - name: MAPL_LATENT_HEAT_SUBLIMATION
    reason: Canonical name; Python exposes deprecated alias MAPL_ALHS
