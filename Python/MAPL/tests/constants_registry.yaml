  # Deprecated Fortran aliases already covered via their canonical Python counterparts
  - name: MAPL_OMEGA
    reason: Deprecated alias; Python derives MAPL_OMEGA from MAPL_PI and MAPL_SECONDS_PER_SIDEREAL_DAY
  - name: MAPL_RGAS
    reason: Deprecated alias for MAPL_RDRY; covered
  - name: MAPL_CP
    reason: Deprecated alias for MAPL_CPDRY; covered
  - name: MAPL_VIREPS
    reason: Deprecated alias; Python exposes directly
  - name: MAPL_KM_PER_DEG
    reason: Deprecated alias for MAPL_KM_PER_DEGREE; covered
  - name: MAPL_DEG_PER_KM
    reason: Deprecated alias for MAPL_DEGREE_PER_KM; covered

  # Fortran-internal flags not needed in Python
  - name: MAPL_UnitsRadians
    reason: Fortran coupling flag not used in Python
  - name: MAPL_FILETYPE_UNK
    reason: Fortran I/O file type code; not needed in Python
  - name: MAPL_FILETYPE_BIN
    reason: Fortran I/O file type code; not needed in Python
  - name: MAPL_FILETYPE_TXT
    reason: Fortran I/O file type code; not needed in Python
  - name: MAPL_FILETYPE_NC4
    reason: Fortran I/O file type code; not needed in Python
  - name: MAPL_MASK_IN
    reason: Internal Fortran field masking flag
  - name: MAPL_MASK_OUT
    reason: Internal Fortran field masking flag
  - name: MAPL_NOQUANTIZE
    reason: Fortran NetCDF quantization flag; not needed in Python
  - name: MAPL_QUANTIZE_BITGROOM
    reason: Fortran NetCDF quantization flag; not needed in Python
  - name: MAPL_QUANTIZE_BITROUND
    reason: Fortran NetCDF quantization flag; not needed in Python
  - name: MAPL_QUANTIZE_GRANULAR_BITROUND
    reason: Fortran NetCDF quantization flag; not needed in Python
  - name: MAPL_QUANTIZE_MAX_NSB
    reason: Fortran NetCDF quantization limit; not needed in Python
  - name: MAPL_QUANTIZE_MAX_NSD
    reason: Fortran NetCDF quantization limit; not needed in Python
  - name: MAPL_NBITS_NOT_SET
    reason: Fortran NetCDF quantization sentinel; not needed in Python
  - name: MAPL_NBITS_UPPER_LIMIT
    reason: Fortran NetCDF quantization limit; not needed in Python

  # MAPL_UNDEF is tested separately in TestKnownIssues (value differs by design from REAL32/REAL64 typed variants)
  - name: MAPL_UNDEF
    reason: Tested separately in TestKnownIssues; value is the REAL32 -huge() sentinel
