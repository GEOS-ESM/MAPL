# constants_registry.yaml
#
# Single source of truth for the Python ↔ Fortran constants consistency tests.
#
# SECTIONS
# --------
# shared_numeric:
#   Constants that must exist in BOTH Python/MAPL/constants.py AND the Fortran
#   source files under shared/Constants/, and whose values must agree.
#   Each entry is either:
#     - a bare name (python name == fortran name), or
#     - a mapping  python_name: fortran_name  (when names differ)
#
# shared_string:
#   Same as shared_numeric but for string/character constants.
#
# fortran_only:
#   Constants that exist in Fortran but are deliberately NOT exposed in Python.
#   Each entry is a name with a mandatory 'reason' comment.
#   Any Fortran constant absent from shared_* AND absent from this list will
#   cause TestCoverage to fail.

# ---------------------------------------------------------------------------
# Shared numeric / integer constants
# ---------------------------------------------------------------------------
