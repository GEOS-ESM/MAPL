    reason: Canonical name; Python exposes deprecated alias MAPL_RHOWTR
  - name: MAPL_DENSITY_SEAWATER
    reason: Canonical name; Python exposes MAPL_RHO_SEAWATER
  - name: MAPL_DENSITY_SEAICE
    reason: Canonical name; Python exposes MAPL_RHO_SEAICE
  - name: MAPL_DENSITY_SNOW
